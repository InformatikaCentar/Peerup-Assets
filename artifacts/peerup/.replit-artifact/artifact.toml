kind = "web"
previewPath = "/"
title = "PeerUp"
version = "1.0.0"
id = "artifacts/peerup"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18535

[services.development]
run = "pnpm --filter @workspace/peerup run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/peerup", "run", "build" ]
publicDir = "artifacts/peerup/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18535"
BASE_PATH = "/"
